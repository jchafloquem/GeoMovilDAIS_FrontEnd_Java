<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="back-circle-button" (click)="goBack()">
        <ion-icon name="arrow-back-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title
      >{{ isProfileRegistered ? 'MI PERFIL' : 'Registro de Perfil' }}</ion-title
    >
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="register-container">
    <ion-card style="border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.30);">
      <ion-card-header>
        <ion-card-title class="ion-text-center"
          >{{ isProfileRegistered ? 'DATOS DEL USUARIO' : 'COMPLETA TU PERFIL'
          }}</ion-card-title
        >
      </ion-card-header>

      <ion-card-content>
        <form
          [formGroup]="profileForm"
          (ngSubmit)="!isProfileRegistered && saveProfile()">
          <ion-list>
            <ion-item>
              <ion-input
                label="DNI"
                labelPlacement="floating"
                type="tel"
                formControlName="dni"
                placeholder="Ingresa tu DNI"
                maxlength="8"
                required
              ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input
                label="Nombres"
                labelPlacement="floating"
                type="text"
                formControlName="nombres"
                placeholder="Ingresa tus nombres"
                required
              ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input
                label="Apellido Paterno"
                labelPlacement="floating"
                type="text"
                formControlName="apellidoPaterno"
                placeholder="Ingresa tu apellido paterno"
                required
              ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input
                label="Apellido Materno"
                labelPlacement="floating"
                type="text"
                formControlName="apellidoMaterno"
                placeholder="Ingresa tu apellido materno"
                required
              ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input
                label="Celular"
                labelPlacement="floating"
                type="tel"
                formControlName="celular"
                placeholder="Ej: 987654321"
                required
              ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input
                label="Correo Electrónico"
                labelPlacement="floating"
                type="email"
                formControlName="email"
                placeholder="tu@correo.com"
                required
              ></ion-input>
            </ion-item>
          </ion-list>

          <ion-button
            *ngIf="!isProfileRegistered"
            style="height: 50px; width: 90%; margin: 20px auto"
            expand="block"
            shape="round"
            type="submit"
            [disabled]="profileForm.invalid"
            color="primary"
          >
            Guardar Perfil
          </ion-button>

          <ion-button
            *ngIf="isProfileRegistered"
            style="height: 50px; width: 90%; margin: 20px auto"
            expand="block"
            shape="round"
            (click)="goToMap()"
            color="primary"
          >
            Volver al Mapa
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
