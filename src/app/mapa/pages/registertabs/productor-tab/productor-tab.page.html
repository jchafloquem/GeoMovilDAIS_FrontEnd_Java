<ion-content>
  <ng-container *ngIf="registerDataService.formData$ | async as formData">
    <ion-card>
      <ion-card-header color="primary">
        <ion-card-title color="white" style="display: flex; justify-content: space-between; align-items: center;">
          Datos del Productor
          <ion-icon *ngIf="formData.uploaded" name="lock-closed" style="font-size: 1.2em;"></ion-icon>
        </ion-card-title>
        <ion-card-subtitle color="white">Fuente: LEVANTAMIENTO EN CAMPO</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-list lines="none">
          <ion-item>
            <ion-input label="DNI" label-placement="stacked" type="tel" maxlength="8" name="DNI"
                       [ngModel]="formData.DNI"
                       (ngModelChange)="formData.DNI = $event"
                       [disabled]="!!formData.uploaded">
            </ion-input>
            <ion-button slot="end" (click)="searchDni()" [disabled]="!formData.DNI || formData.DNI.length !== 8 || !!formData.uploaded">
              <ion-icon name="search" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-item>

          <ion-item>
            <ion-input label="Nombres" label-placement="stacked" name="NOMBRES"
                       [ngModel]="formData.NOMBRES"
                       (ngModelChange)="formData.NOMBRES = $event"
                       [disabled]="!!formData.uploaded"></ion-input>
          </ion-item>

          <ion-item>
            <ion-input label="Apellido Paterno" label-placement="stacked" name="APELLIDO_PATERNO"
                       [ngModel]="formData.APELLIDO_PATERNO"
                       (ngModelChange)="formData.APELLIDO_PATERNO = $event"
                       [disabled]="!!formData.uploaded"></ion-input>
          </ion-item>

          <ion-item>
            <ion-input label="Apellido Materno" label-placement="stacked" name="APELLIDO_MATERNO"
                       [ngModel]="formData.APELLIDO_MATERNO"
                       (ngModelChange)="formData.APELLIDO_MATERNO = $event"
                       [disabled]="!!formData.uploaded"></ion-input>
          </ion-item>

          <ion-item>
            <ion-input label="Fecha de Nacimiento" label-placement="stacked" type="date" name="FECHA_NACIMIENTO"
                       [ngModel]="formData.FECHA_NACIMIENTO"
                       (ngModelChange)="formData.FECHA_NACIMIENTO = $event"
                       [disabled]="!!formData.uploaded"></ion-input>
          </ion-item>

          <ion-item>
            <ion-input label="Celular" label-placement="stacked" type="tel" maxlength="9" pattern="[0-9]*" name="CELULAR_PARTICIPANTE"
                       [ngModel]="formData.CELULAR_PARTICIPANTE"
                       (ngModelChange)="formData.CELULAR_PARTICIPANTE = $event"
                       [disabled]="formData.CELULAR_PARTICIPANTE === 'NO TIENE' || !!formData.uploaded"
                       required></ion-input>
          </ion-item>
          <ion-item lines="none">
            <ion-checkbox [checked]="formData.CELULAR_PARTICIPANTE === 'NO TIENE'"
                          (ionChange)="formData.CELULAR_PARTICIPANTE = $event.detail.checked ? 'NO TIENE' : ''"
                          [disabled]="!!formData.uploaded">No tiene Celular</ion-checkbox>
          </ion-item>

          <ion-item>
            <ion-select label="Tipo de Productor" label-placement="stacked" interface="action-sheet" placeholder="Seleccione una opción" name="TIPO_PRODUCTOR"
                        [ngModel]="formData.TIPO_PRODUCTOR"
                        (ngModelChange)="formData.TIPO_PRODUCTOR = $event"
                        [disabled]="!!formData.uploaded">
              <ion-select-option value="SOCIO">SOCIO</ion-select-option>
              <ion-select-option value="SOCIO-PARTICIPANTE">SOCIO-PARTICIPANTE</ion-select-option>
              <ion-select-option value="PARTICIPANTE">PARTICIPANTE</ion-select-option>
              <ion-select-option value="TRANSFERENCIA">TRANSFERENCIA</ion-select-option>
            </ion-select>
          </ion-item>

          <ion-item-divider>
            <ion-label>Fotos del DNI (Opcional)</ion-label>
          </ion-item-divider>

          <div class="dni-photo-grid">
            <!-- DNI Anverso -->
            <div class="dni-photo-container">
              <div class="photo-box" (click)="!formData.uploaded && takeDniPhoto('front')" [class.disabled-box]="formData.uploaded" [style.opacity]="formData.uploaded ? '0.5' : '1'" [style.pointer-events]="formData.uploaded ? 'none' : 'auto'">
                <img *ngIf="formData.RUTA_DNI_FRONT" [src]="getCapacitorFileSrc(formData.RUTA_DNI_FRONT)" alt="DNI Anverso" />
                <ion-icon *ngIf="!formData.RUTA_DNI_FRONT" name="camera-outline"></ion-icon>
                <ion-label *ngIf="!formData.RUTA_DNI_FRONT">Anverso</ion-label>
              </div>
              <ion-button *ngIf="formData.RUTA_DNI_FRONT && !formData.uploaded" fill="clear" color="danger" size="small" class="delete-dni-btn" (click)="deleteDniPhoto('front', $event)">
                <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
              </ion-button>
            </div>
            <!-- DNI Reverso -->
            <div class="dni-photo-container">
              <div class="photo-box" (click)="!formData.uploaded && takeDniPhoto('back')" [class.disabled-box]="formData.uploaded" [style.opacity]="formData.uploaded ? '0.5' : '1'" [style.pointer-events]="formData.uploaded ? 'none' : 'auto'">
                <img *ngIf="formData.RUTA_DNI_BACK" [src]="getCapacitorFileSrc(formData.RUTA_DNI_BACK)" alt="DNI Reverso" />
                <ion-icon *ngIf="!formData.RUTA_DNI_BACK" name="camera-outline"></ion-icon>
                <ion-label *ngIf="!formData.RUTA_DNI_BACK">Reverso</ion-label>
              </div>
              <ion-button *ngIf="formData.RUTA_DNI_BACK && !formData.uploaded" fill="clear" color="danger" size="small" class="delete-dni-btn" (click)="deleteDniPhoto('back', $event)">
                <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
              </ion-button>
            </div>
          </div>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </ng-container>
</ion-content>
