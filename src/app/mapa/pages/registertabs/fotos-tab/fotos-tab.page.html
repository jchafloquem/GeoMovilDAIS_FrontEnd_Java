<ion-content>
  <ng-container *ngIf="registerDataService.photosForDisplay$ | async as photosForDisplay">
    <!-- Botón para tomar foto -->
    <ion-button expand="block" class="main-action-button" (click)="registerDataService.takePicture()" [disabled]="photosForDisplay.length >= 6">
      <ion-icon slot="start" name="camera"></ion-icon>
      Añadir Foto ({{ photosForDisplay.length }} / 6)
    </ion-button>

    <!-- Cuadrícula de fotos -->
    <div *ngIf="photosForDisplay.length > 0" class="photo-grid">
      <div *ngFor="let photo of photosForDisplay; let i = index" class="photo-item" (click)="openViewer(i)">
        <img [src]="photo" alt="Foto {{ i + 1 }}" />
        <ion-button fill="clear" class="delete-photo-btn" (click)="deletePhoto(i, $event)">
          <ion-icon slot="icon-only" name="close-circle"></ion-icon>
        </ion-button>
      </div>
    </div>

    <!-- Mensaje cuando no hay fotos -->
    <div *ngIf="photosForDisplay.length === 0" class="no-photos-container">
      <ion-icon name="images-outline"></ion-icon>
      <p>Aún no has tomado ninguna foto.</p>
      <p>¡Usa el botón de arriba para empezar!</p>
    </div>

    <!-- Visor de imágenes a pantalla completa (Modal) -->
    <ion-modal [isOpen]="isViewerOpen" (didDismiss)="closeViewer()">
      <ng-template>
        <div class="viewer-container">
          <ion-button fill="clear" class="close-viewer-btn" (click)="closeViewer()">
            <ion-icon slot="icon-only" name="close"></ion-icon>
          </ion-button>
          <swiper-container *ngIf="photosForDisplay.length > 0" class="viewer-swiper" [options]="viewerSlideOpts" [zoom]="true" [initialSlide]="viewerSlideOpts.initialSlide">
            <swiper-slide *ngFor="let photo of photosForDisplay">
              <div class="swiper-zoom-container">
                <img [src]="photo" />
              </div>
            </swiper-slide>
          </swiper-container>
        </div>
      </ng-template>
    </ion-modal>
  </ng-container>
</ion-content>
