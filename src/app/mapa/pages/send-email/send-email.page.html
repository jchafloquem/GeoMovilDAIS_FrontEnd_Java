<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/mapa"></ion-back-button>
    </ion-buttons>
    <ion-title>Enviar Reporte por Email</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Enviar Reporte</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-item>
    <ion-label position="floating">Email del Destinatario</ion-label>
    <ion-input type="email" [(ngModel)]="destinatarioEmail" placeholder="destinatario@ejemplo.com"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="enviarReporte()" class="ion-margin-top">
    <ion-icon slot="start" name="mail-outline"></ion-icon>
    Enviar Reporte
  </ion-button>
</ion-content>
